syntax = "proto3";
package ley.app.comment.internal.conf;

option go_package = "ley/app/comment/internal/conf";

import "google/protobuf/duration.proto";
import "conf/types.proto";
message Config {
  ley.conf.Minio minio = 2;
  Data data = 1;
}

message Data {
  message Database {
    string driver = 1;
    string host = 2;
    int32 port = 3;
    string database = 4;
    string username = 5;
    string password = 6;
  }

  message Redis {
    string network = 1;
    string host = 2;
    int32 port = 3;
    string password = 4;
    int32 db = 5;
    google.protobuf.Duration read_timeout = 6;
    google.protobuf.Duration write_timeout = 7;
  }
  Database database = 1;
  Redis redis = 2;
}
