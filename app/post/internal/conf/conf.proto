// conf.proto — 文章服务配置定义
//
// 定义文章服务所需的远程配置结构（Data + NATS + MinIO）。
// Bootstrap（Server/Log/Etcd/Trace）由 conf/common.proto 统一定义。
syntax = "proto3";

package ley.app.post.internal.conf;

option go_package = "ley/app/post/internal/conf";

import "google/protobuf/duration.proto";
import "conf/types.proto";

// ---------------------------------------------------------------------------
// Config — 文章服务远程配置（由 etcd 下发）
// ---------------------------------------------------------------------------
message Config {
  // 数据源配置（数据库 + 缓存）
  Data data = 1;

  // NATS 消息队列配置（事件驱动：文章发布→通知/计数更新）
  Nats nats = 2;

  // MinIO 对象存储（文章封面图，可选）
  ley.conf.Minio minio = 3;
}

// ---------------------------------------------------------------------------
// Nats — NATS JetStream 消息队列配置
// 用于发布文章生命周期事件（created/published/updated/deleted）
// 和消费评论事件（comment.created → 更新文章评论计数）
// ---------------------------------------------------------------------------
message Nats {
  // NATS 服务端地址（如 nats://localhost:4222）
  string addr = 1;

  // JetStream 是否启用
  bool enable_jetstream = 2;
}

// ---------------------------------------------------------------------------
// Data — 数据源配置
// ---------------------------------------------------------------------------
message Data {

  // Database — PostgreSQL 连接配置
  // 使用 "post" Schema 存储文章、标签、分类数据
  message Database {
    // 数据库驱动：postgres / mysql
    string driver = 1;

    // 数据库主机地址
    string host = 2;

    // 数据库端口
    int32 port = 3;

    // 数据库名称
    string database = 4;

    // 数据库用户名
    string username = 5;

    // 数据库密码
    string password = 6;
  }

  // Redis — Redis 连接配置
  // 用于文章详情缓存、列表缓存、标签/分类全量缓存、浏览计数
  message Redis {
    // 连接协议：tcp / unix
    string network = 1;

    // Redis 主机地址
    string host = 2;

    // Redis 端口
    int32 port = 3;

    // Redis 密码（留空表示无密码）
    string password = 4;

    // Redis 数据库编号（0-15）
    int32 db = 5;

    // 读取超时
    google.protobuf.Duration read_timeout = 6;

    // 写入超时
    google.protobuf.Duration write_timeout = 7;
  }

  Database database = 1;
  Redis redis = 2;
}
