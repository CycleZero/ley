# 文章服务远程配置 — 对应 app/post/internal/conf/conf.proto 的 Config
# 由 etcd 下发，路径: ley/configs/post/config.yaml

data:
  database:
    driver: postgres
    host: 127.0.0.1
    port: 5432
    database: ley
    username: ley
    password: ley123
  redis:
    network: tcp
    host: 127.0.0.1
    port: 6379
    password: ""
    db: 0
    read_timeout: 0.2s
    write_timeout: 0.2s

nats:
  addr: nats://127.0.0.1:4222
  enable_jetstream: true

minio:
  endpoint: 127.0.0.1:9000
  access_key_id: minioadmin
  access_key_secret: minioadmin
  bucket_name: ley-images
