# ================================
# Ley 博客平台 Docker Compose 配置
# ================================
# 使用 host 网络模式
#
# 使用方法:
#   docker-compose build          # 构建所有服务
#   docker-compose up -d           # 启动所有服务
#   docker-compose logs -f auth    # 查看 auth 服务日志
#   docker-compose down            # 停止所有服务
# ================================

services:
  # ================================
  # Gateway — API 网关 :8000
  # ================================
  gateway:
    build:
      context: .
      dockerfile: app/gateway/Dockerfile
    image: ley-gateway:latest
    container_name: ley-gateway
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    depends_on:
      - auth
      - blog

  # ================================
  # Auth 服务 — :9001 (gRPC) / :8001 (HTTP)
  # ================================
  auth:
    build:
      context: .
      dockerfile: app/auth/Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
        SERVICE_NAME: auth
    image: ley-auth:latest
    container_name: ley-auth
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # ================================
  # Blog 服务 — :9002 (gRPC) / :8002 (HTTP)
  # ================================
  blog:
    build:
      context: .
      dockerfile: app/blog/Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
        SERVICE_NAME: blog
    image: ley-blog:latest
    container_name: ley-blog
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
